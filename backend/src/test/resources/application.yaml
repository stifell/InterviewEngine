spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:mem:interviewengine;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: true
  ai:
    google:
      genai:
        api-key: test-dummy-key
