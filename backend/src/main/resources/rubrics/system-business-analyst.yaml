position: "System Business Analyst"
durationMinutes: 20

# Структура интервью воспроизводит шаблон из транскрипта «Интервью 2»:
# Блок 1 — опыт кандидата (Icebreaker / Background)
# Блок 2 — STAR: сложная аналитическая ситуация
# Блок 3 — Hard Skills: требования, данные, конфликты, инструменты
# Блок 4 — Завершение: вопросы кандидата, мотивация, первые 3 месяца

blocks:
  - id: block1
    order: 1
    title: "Опыт и background"
    timingMinutes: 3
    mainQuestion: "Расскажите, чем вы занимались последние пару лет. С какими продуктами, командами и аналитическими задачами работали?"
    probes:
      - id: p1_1
        text: "Какова была ваша личная роль на последнем проекте? За какие этапы вы отвечали?"
        indicator: ind_role_clarity

  - id: block2
    order: 2
    title: "STAR — поведенческий блок"
    timingMinutes: 7
    mainQuestion: "Вспомните самую сложную аналитическую задачу или проблемную ситуацию, с которой вы лично столкнулись за последний год. Расскажите о ней."
    probes:
      - id: p2_1
        text: "В каких условиях возникла эта проблема? Какие были вводные данные и ограничения?"
        indicator: ind_star_situation_task
      - id: p2_2
        text: "Какие конкретно действия предприняли именно вы — что делали лично, а не команда?"
        indicator: ind_first_person
      - id: p2_3
        text: "Какие альтернативные подходы рассматривали и почему от них отказались?"
        indicator: ind_conflict_resolution
      - id: p2_4
        text: "К какому результату привели ваши действия? Как измеряли успешность — назовите цифры."
        indicator: ind_metrics

  - id: block3
    order: 3
    title: "Hard Skills аналитика"
    timingMinutes: 8
    mainQuestion: "Как вы обычно подходите к работе с новой задачей, когда бизнес приходит с общей формулировкой — например «улучшить клиентский путь» или «ускорить обработку заявки»?"
    probes:
      - id: p3_1
        text: "Как вы фиксируете требования? Какие артефакты обычно готовите и что в них включаете?"
        indicator: ind_requirements_artifacts
      - id: p3_2
        text: "Как вы проверяете, что требования получились качественными?"
        indicator: ind_requirements_quality
      - id: p3_3
        text: "Насколько уверенно вы работаете с SQL и аналитикой данных? Приведите пример из практики."
        indicator: ind_sql_data
      - id: p3_4
        text: "Если разработчик говорит «такое требование сложно реализовать» — как вы действуете?"
        indicator: ind_dev_stakeholder

  - id: block4
    order: 4
    title: "Завершение"
    timingMinutes: 2
    mainQuestion: "Какие профессиональные вопросы о проекте, процессах, команде или стеке у вас остались?"
    probes: []

competencies:

  # ── 1. Ownership ─────────────────────────────────────────────────────────────
  - id: comp_ownership
    title: "Ownership"
    block: block2
    weight: 0.15
    indicators:
      - id: ind_first_person
        text: "Говорит «я сделала / я провела», а не «мы делали» при описании своих действий"
        signals: [ownershipRatio, answerLength]
        bars:
          0: "Полностью обезличенно — «команда сделала», «так получилось», «нам пришлось»"
          2: "Смешивает я/мы, личный вклад размыт или не выделен"
          3: "Чаще «я», но без конкретных личных действий"
          5: "Чётко выделяет свои действия глаголами 1-го лица + объясняет, почему именно так"
        acceptableFrom: 3

      - id: ind_role_clarity
        text: "Внятно описывает свою роль и зоны ответственности на проекте"
        signals: [ownershipRatio, termCoverage]
        terms: ["отвечала", "отвечал", "моя зона", "мои задачи", "я проводила",
                "я проводил", "я описывала", "я описывал", "я готовила", "я готовил",
                "моя ответственность", "на мне", "я вела", "я вёл", "end-to-end"]
        bars:
          0: "Роль не названа или описана как «помогала команде»"
          2: "Назвала должность, но не зоны ответственности"
          3: "Перечислила зоны ответственности конкретно"
          5: "Зоны ответственности + конкретные артефакты или решения, которые принимала лично"
        acceptableFrom: 3

  # ── 2. Ориентация на результат ────────────────────────────────────────────────
  - id: comp_results
    title: "Ориентация на результат"
    block: block2
    weight: 0.15
    indicators:
      - id: ind_metrics
        text: "Называет конкретные измеримые метрики результата"
        signals: [hasMetrics, answerLength]
        bars:
          0: "Ни одной цифры — только «стало лучше», «ускорили», «улучшили»"
          2: "Одна цифра без контекста или временного окна"
          3: "Две-три метрики с понятными единицами (%, минуты, дни)"
          5: "Метрики до / после с единицами + объяснение причины улучшения"
        acceptableFrom: 3

      - id: ind_star_situation_task
        text: "Раскрывает Situation и Task — контекст, ограничения и задачу лично"
        signals: [starComponents, answerLength]
        bars:
          0: "Сразу к действиям, контекст и задача отсутствуют"
          2: "Упоминает ситуацию одной фразой без ограничений"
          3: "Описывает ситуацию И задачу, но без конкретных ограничений или дедлайнов"
          5: "Внятно описывает ситуацию, задачу, ограничения (сроки, регуляторика, технические) и почему было сложно"
        acceptableFrom: 3

  # ── 3. Управление требованиями ───────────────────────────────────────────────
  - id: comp_requirements
    title: "Управление требованиями"
    block: block3
    weight: 0.25
    indicators:
      - id: ind_requirements_artifacts
        text: "Называет конкретные артефакты и описывает их содержимое"
        signals: [termCoverage, answerLength]
        terms: ["user story", "user stories", "acceptance criteria", "BPMN", "bpmn",
                "API", "api", "контракт", "контракты", "бизнес-правила", "бизнес правила",
                "статусы", "ошибки", "нефункциональные", "функциональные",
                "декомпозиция", "backlog"]
        bars:
          0: "Говорит «ТЗ» или «документация» без конкретики"
          2: "Называет 1–2 артефакта без описания содержимого"
          3: "Называет 3+ артефакта и кратко объясняет, что в них входит"
          5: "Перечисляет артефакты, объясняет содержимое каждого и когда именно применяет"
        acceptableFrom: 3

      - id: ind_requirements_quality
        text: "Понимает критерии качества требований и проводит ревью с командой"
        # hedgingDensity (лексика) + pauseRatio (просодика) = маркеры неуверенности
        signals: [termCoverage, hedgingDensity, pauseRatio]
        terms: ["понятные", "непротиворечивые", "проверяемые", "реализуемые",
                "ревью", "review", "проверка", "тест", "демонстрация",
                "QA", "qa", "разработка", "product owner", "edge case", "негативный сценарий"]
        bars:
          0: "Не называет ни одного критерия качества"
          2: "Упоминает ревью, но без критериев или участников"
          3: "Называет 2–3 критерия или описывает процесс ревью с конкретными участниками"
          5: "Описывает критерии + процесс ревью с ролями + проверку негативных сценариев"
        acceptableFrom: 3

      - id: ind_conflict_resolution
        text: "Умеет находить баланс между конфликтующими требованиями стейкхолдеров"
        signals: [ownershipRatio, answerLength, termCoverage]
        terms: ["баланс", "компромисс", "MVP", "mvp", "альтернатива", "альтернативы",
                "приоритет", "приоритизация", "риск", "бизнес-ценность",
                "таблица", "варианты", "стейкхолдер", "согласовали", "договорились"]
        bars:
          0: "Не знает, как поступать при конфликте требований, или занимает одну сторону"
          2: "Говорит «нужно договориться», но не объясняет как"
          3: "Называет конкретные приёмы (MVP, матрица решений, приоритизация)"
          5: "Описывает системный подход: сбор вариантов, критерии выбора, визуализация для всех сторон + личный пример"
        acceptableFrom: 3

  # ── 4. Работа со стейкхолдерами и разработкой ───────────────────────────────
  - id: comp_stakeholders
    title: "Работа со стейкхолдерами"
    block: block3
    weight: 0.15
    indicators:
      - id: ind_dev_stakeholder
        text: "Умеет работать с возражением «сложно реализовать» без давления"
        signals: [ownershipRatio, hedgingDensity, termCoverage]
        terms: ["цель", "бизнес-ценность", "альтернатива", "альтернативы",
                "другой способ", "MVP", "ограничение", "архитектурное",
                "реальное время", "кэш", "сегмент", "следующий этап", "следующий релиз"]
        bars:
          0: "Настаивает на исходном требовании или уступает сразу без анализа"
          2: "Уточняет причину сложности, но не предлагает альтернатив"
          3: "Возвращается к цели и предлагает 1–2 альтернативы"
          5: "Уточняет причину → возвращается к цели → предлагает несколько альтернатив с учётом бизнес-ценности и технических ограничений"
        acceptableFrom: 3

      - id: ind_post_release_analysis
        text: "Анализирует проблему системно: данные → гипотеза → решение → метрика"
        signals: [hasMetrics, termCoverage, answerLength]
        terms: ["логи", "воронка", "данные", "статусы", "аналитика", "обращения",
                "сегмент", "гипотеза", "дефект", "исправление", "метрика", "после релиза",
                "конверсия", "ошибка", "поддержка"]
        bars:
          0: "Сразу предлагает решение без сбора данных"
          2: "Упоминает «посмотреть данные», но без структуры анализа"
          3: "Описывает последовательность: факты → анализ → гипотеза → решение"
          5: "Полный цикл: факты → данные → гипотезы → решение → метрика для контроля эффекта"
        acceptableFrom: 3

  # ── 5. Технический кругозор ──────────────────────────────────────────────────
  - id: comp_technical
    title: "Технический кругозор"
    block: block3
    weight: 0.15
    indicators:
      - id: ind_sql_data
        text: "Уверенно работает с SQL для анализа данных и проверки гипотез"
        signals: [termCoverage, hasMetrics]
        terms: ["SQL", "sql", "JOIN", "join", "GROUP BY", "group by", "CTE", "cte",
                "оконные функции", "воронка", "конверсия", "аномалия", "валидация",
                "DBeaver", "BI", "Power BI", "Superset", "сегмент", "до и после"]
        bars:
          0: "SQL не упоминается или упоминается как «знаком поверхностно»"
          2: "Использует базовые запросы (SELECT/WHERE/JOIN), без аналитики"
          3: "Использует GROUP BY, оконные функции, CTE; может описать конкретную задачу"
          5: "Строит воронки, сравнивает сегменты, использует продвинутые конструкции + приводит конкретный пример из практики"
        acceptableFrom: 3

      - id: ind_system_thinking
        text: "Понимает системную часть: откуда данные, какие API, таймауты, кэш, метрики"
        signals: [termCoverage, hedgingDensity]
        terms: ["API", "api", "backend", "backend-сервис", "фронт", "кэш", "таймаут",
                "сервис", "интеграция", "метрика", "логирование", "SLA", "sla",
                "JSON", "json", "OpenAPI", "openapi", "Swagger", "swagger", "Postman", "postman"]
        bars:
          0: "Описывает только пользовательский сценарий, системную часть не упоминает"
          2: "Упоминает API или бэкенд без деталей"
          3: "Описывает системную часть: источник данных, API, обработку ошибок"
          5: "Детально описывает системный сценарий: источник → API → кэш/таймауты → логирование → метрики"
        acceptableFrom: 3

  # ── 6. Уверенность и беглость речи (просодика) ───────────────────────────────
  # Оценивается ТОЛЬКО при аудиовходе (нужен сайдкар с Praat). Для текстовых
  # интервью индикаторы пропускаются, и домен не попадает в скоркарту.
  # Сигналы — поля com.interviewengine.domain.ProsodicFeatures.
  - id: comp_speech_confidence
    title: "Уверенность и беглость речи"
    block: block2
    weight: 0.15
    indicators:
      - id: ind_speech_fluency
        text: "Говорит в ровном темпе, без длинных пауз и заминок"
        signals: [speechRate, pauseRatio, meanPauseMs]
        bars:
          0: "Рваный темп: очень медленно с долгими паузами или сбивчиво и торопливо"
          2: "Заметные паузы и заминки заполнения мешают восприятию"
          3: "В целом ровно; паузы перед сложными местами уместны"
          5: "Ровный комфортный темп ~100–160 слов/мин, речь течёт без заминок"
        acceptableFrom: 3

      - id: ind_intonation_expressiveness
        text: "Речь выразительная, интонационно живая, не монотонная"
        signals: [pitchVariationSemitones, intensityVariationDb]
        bars:
          0: "Монотонно, на одной ноте, без интонационных акцентов"
          2: "Интонация бедная, акценты редкие"
          3: "Есть интонационная вариативность, речь не плоская"
          5: "Живая выразительная интонация, голосом выделяет главное"
        acceptableFrom: 3
