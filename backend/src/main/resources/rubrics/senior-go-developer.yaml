position: "Senior Go Developer"
durationMinutes: 20

blocks:
  - id: block1
    order: 1
    title: "Icebreaker"
    timingMinutes: 3
    mainQuestion: "Расскажите коротко о вашем опыте коммерческой разработки на Go: какие проекты, какие задачи решали?"
    probes:
      - id: p1_1
        text: "Какова была ваша личная роль на последнем проекте?"
        indicator: ind_role_clarity

  - id: block2
    order: 2
    title: "STAR — поведенческий блок"
    timingMinutes: 7
    mainQuestion: "Расскажите о самой сложной технической проблеме, которую вы лично решили за последние полгода."
    probes:
      - id: p2_1
        text: "Какова была изначальная ситуация и задача — что нужно было сделать и почему это было сложно?"
        indicator: ind_star_situation_task
      - id: p2_2
        text: "Какие конкретно действия предприняли именно вы — что делали лично, а не команда?"
        indicator: ind_first_person
      - id: p2_3
        text: "Какой измеримый результат получили? Назовите цифры — до и после."
        indicator: ind_metrics

  - id: block3
    order: 3
    title: "Hard Skills — Go"
    timingMinutes: 8
    mainQuestion: "Расскажите, как устроена работа горутин и каналов в Go. В каких случаях вы используете буферизованные каналы, а в каких — нет?"
    probes:
      - id: p3_1
        text: "Что произойдёт, если писать в небуферизованный канал, когда нет читателя?"
        indicator: ind_concurrency_correctness
      - id: p3_2
        text: "Чем отличается select с default от select без default?"
        indicator: ind_concurrency_depth
      - id: p3_3
        text: "Приведите пример из своей практики, где вам пришлось отлаживать гонку данных."
        indicator: ind_concurrency_experience

  - id: block4
    order: 4
    title: "Завершение"
    timingMinutes: 2
    mainQuestion: "Какие у вас остались вопросы по позиции и команде?"
    probes: []

competencies:
  - id: comp_ownership
    title: "Ownership"
    block: block2
    weight: 0.25
    indicators:
      - id: ind_first_person
        text: "Говорит «я сделал», а не «мы делали»"
        signals: [ownershipRatio, answerLength]
        bars:
          0: "Полностью обезличенно («так получилось», «команда сделала»)"
          2: "Смешивает я/мы, личный вклад размыт"
          3: "Чаще «я», но без деталей конкретных личных действий"
          5: "Чётко выделяет личные действия глаголами 1-го лица + их последствия"
        acceptableFrom: 3
      - id: ind_role_clarity
        text: "Внятно описывает свою роль в проекте"
        signals: [ownershipRatio, termCoverage]
        terms: ["отвечал", "отвечала", "руководил", "руководила", "принимал решения",
                "принимала решения", "архитектор", "тимлид", "технический лид",
                "ответственность", "зоны ответственности"]
        bars:
          0: "Роль не названа"
          2: "Назвал должность, но не зоны ответственности"
          3: "Перечислил зоны ответственности"
          5: "Зоны ответственности + примеры конкретных решений, которые принимал лично"
        acceptableFrom: 3

  - id: comp_results
    title: "Ориентация на результат"
    block: block2
    weight: 0.15
    indicators:
      - id: ind_metrics
        text: "Называет конкретные метрики результата"
        signals: [hasMetrics]
        bars:
          0: "Ни одной цифры или единицы измерения"
          2: "Только качественное утверждение («стало быстрее»)"
          3: "Одна-две цифры без полного контекста"
          5: "Метрики до/после с единицами и временным окном"
        acceptableFrom: 3
      - id: ind_star_situation_task
        text: "Раскрывает ситуацию и задачу (S/T в STAR)"
        signals: [starComponents, answerLength]
        bars:
          0: "Сразу про действия, контекст отсутствует"
          2: "Упоминает контекст одной фразой"
          3: "Внятно описывает ситуацию ИЛИ задачу"
          5: "Внятно описывает И ситуацию, И задачу — с ограничениями и почему было сложно"
        acceptableFrom: 3

  - id: comp_concurrency
    title: "Concurrency в Go"
    block: block3
    weight: 0.30
    indicators:
      - id: ind_concurrency_correctness
        text: "Корректно описывает блокирующее поведение каналов"
        # hedgingDensity (лексика) + pauseRatio (просодика) = маркеры неуверенности
        signals: [termCoverage, hedgingDensity, pauseRatio]
        terms: ["горутина", "горутины", "канал", "каналы", "заблокируется",
                "блокировка", "буферизованный", "небуферизованный", "шедулер",
                "рантайм", "планировщик", "отправитель", "получатель"]
        bars:
          0: "Грубо ошибается (например, утверждает, что писатель не блокируется)"
          2: "Описание частично верное, путает термины"
          3: "Верно описывает блокировку, но без обоснования"
          5: "Верно объясняет блокировку + причину на уровне рантайма / шедулера"
        acceptableFrom: 3
      - id: ind_concurrency_depth
        text: "Понимает семантику select"
        signals: [termCoverage]
        terms: ["select", "default", "блокирующий", "неблокирующий",
                "блокирует", "блокируется", "polling", "timeout", "тайм-аут"]
        bars:
          0: "Не знает про select default"
          2: "Знает про default, но не объясняет разницу"
          3: "Объясняет разницу блокирующий vs неблокирующий select"
          5: "Приводит сценарий, где default критичен (например, polling или timeout-канал)"
        acceptableFrom: 3
      - id: ind_concurrency_experience
        text: "Имеет реальный опыт отладки гонок данных"
        signals: [hasMetrics, answerLength]
        bars:
          0: "Не сталкивался / отвечает абстрактно"
          2: "Слышал про -race, но сам не применял"
          3: "Применял -race, но без деталей конкретной истории"
          5: "Конкретная история: симптом → диагностика → фикс → как убедились"
        acceptableFrom: 3

  - id: comp_communication
    title: "Коммуникация"
    block: block1
    weight: 0.15
    indicators:
      - id: ind_clarity
        text: "Структурированно излагает мысли"
        # лексика (слова-паразиты, разнообразие) + просодика (темп, паузы) вместе
        # характеризуют связность и плавность речи
        signals: [fillerDensity, lexicalDiversity, answerLength, speechRate, pauseRatio]
        bars:
          0: "Сплошной поток без структуры, много слов-паразитов и заминок"
          2: "Местами понятно, много «ну/как бы/вот»"
          3: "В целом ясно, есть мелкие проблемы с потоком речи"
          5: "Чёткая структура, минимум воды, грамотная речь"
        acceptableFrom: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Просодический домен: оценивается ТОЛЬКО при аудиовходе (нужен сайдкар с Praat).
  # Для текстовых интервью индикаторы пропускаются, и домен не попадает в скоркарту.
  # Сигналы — поля com.interviewengine.domain.ProsodicFeatures.
  # ─────────────────────────────────────────────────────────────────────────
  - id: comp_speech_confidence
    title: "Уверенность и беглость речи"
    block: block2
    weight: 0.15
    indicators:
      - id: ind_speech_fluency
        text: "Говорит в ровном темпе, без длинных пауз и заминок"
        signals: [speechRate, pauseRatio, meanPauseMs]
        bars:
          0: "Рваный темп: либо очень медленно с долгими паузами, либо сбивчиво и торопливо"
          2: "Заметные паузы/заминки мешают восприятию, темп нестабильный"
          3: "В целом ровно, отдельные паузы перед сложными местами — это нормально"
          5: "Ровный комфортный темп (~100–160 слов/мин), паузы уместны и коротки"
        acceptableFrom: 3
      - id: ind_intonation_expressiveness
        text: "Речь выразительная, интонационно живая, не монотонная"
        signals: [pitchVariationSemitones, intensityVariationDb]
        bars:
          0: "Монотонно, на одной ноте, без интонационных акцентов"
          2: "Интонация бедная, акценты редкие"
          3: "Есть интонационная вариативность, речь не плоская"
          5: "Живая выразительная интонация, смысловые акценты голосом"
        acceptableFrom: 3
