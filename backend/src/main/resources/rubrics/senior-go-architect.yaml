position: "Senior Go Developer / Architect"
durationMinutes: 35

# Рубрикатор основан на комплексном бланке оценки (3 независимые шкалы).
# Шкала документа 0–4 → BARS 0–5; acceptableFrom: 3 соответствует «Уровень Senior».
#
# Веса компетенций:
#   comp_ownership          20 %
#   comp_system_arch        30 %
#   comp_tech_go            35 %
#   comp_speech_confidence  15 %  (просодика — только при аудиовходе)

blocks:
  - id: block1
    order: 1
    title: "Введение и калибровка мотивации (Icebreaker)"
    timingMinutes: 5
    mainQuestion: >
      Расскажите о проекте за последний год, где ваш технический вклад был наиболее значимым.
      За какой кусок архитектуры вы отвечали лично?
    probes:
      - id: p1_1
        text: >
          Многие опытные специалисты делают выбор: развиваться в сторону Team Lead
          или уходить в Senior IC / Архитекторы. Какой баланс между написанием кода,
          проектированием и управлением для вас сейчас идеален и почему?
        indicator: ind_ownership_career

  - id: block2
    order: 2
    title: "Архитектура и системное мышление (System Design & STAR)"
    timingMinutes: 10
    mainQuestion: >
      Расскажите о самом сложном инциденте на проде — например, деградация производительности
      при пиковой нагрузке, — который вы лично расследовали.
    probes:
      - id: p2_1
        text: >
          Представьте, что нам нужно спроектировать сервис раздачи конфигураций для сотен
          тысяч подключённых клиентов. Клиенты должны получать обновления почти в реальном
          времени. Какие подходы и протоколы вы бы выбрали?
        indicator: ind_arch_design

  - id: block3
    order: 3
    title: "Hard Skills: Go Internals, Concurrency & Memory"
    timingMinutes: 15
    mainQuestion: >
      Как устроен слайс под капотом? Приведите пример, как можно получить неочевидную
      утечку памяти при работе со слайсами, и как её избежать?
    probes:
      - id: p3_1
        text: >
          Что произойдёт, если несколько горутин будут одновременно писать в стандартную
          map без мьютексов? Можно ли поймать эту ошибку через recover?
        indicator: ind_go_map_sync
      - id: p3_2
        text: >
          В чём разница поведения при чтении из закрытого канала и чтении из nil-канала?
        indicator: ind_go_channels
      - id: p3_3
        text: >
          В высоконагруженном сервисе сборщик мусора начал потреблять слишком много CPU.
          Какие инструменты вы используете для поиска проблемы и какие паттерны примените
          для оптимизации?
        indicator: ind_go_gc_perf

  - id: block4
    order: 4
    title: "Завершение"
    timingMinutes: 5
    mainQuestion: >
      Если вы получите офферы от нас и от компании с аналогичными условиями, какой
      технический фактор станет для вас решающим при выборе?
    probes: []

competencies:

  # ── Ownership & Мотивация ───────────────────────────────────────────────────
  - id: comp_ownership
    title: "Ownership & Мотивация"
    block: block1
    weight: 0.20
    indicators:

      - id: ind_ownership_zone
        text: "Чётко очерчивает личную зону ответственности в архитектуре"
        signals: [ownershipRatio, answerLength]
        bars:
          0: "Роль не названа или полностью обезличена («мы делали», «так получилось»)"
          1: "Называет должность, но не описывает конкретных решений, принятых лично"
          2: "Перечисляет зоны ответственности без аргументации и конкретных примеров"
          3: "Чётко описывает архитектурный участок с примерами личных решений"
          4: "Добавляет trade-offs принятых решений и их последствия для системы"
          5: "Полный ownership: зона + ограничения + отвергнутые альтернативы + измеримый итог"
        acceptableFrom: 3

      - id: ind_ownership_career
        text: "Аргументирует карьерный выбор зрелыми техническими доводами"
        signals: [answerLength, lexicalDiversity]
        bars:
          0: "Нет ясности в карьерных ожиданиях; ответ уклончивый или противоречивый"
          1: "Хочет «и код писать, и управлять» без понимания разницы и своих приоритетов"
          2: "Обозначает предпочтение, но не может обосновать его техническими доводами"
          3: "Чётко формулирует желаемый баланс с конкретными примерами из опыта"
          4: "Анализирует компромиссы каждой траектории; позиция совпадает с профилем вакансии"
          5: "Зрелая позиция: понимает ценность обеих ролей, называет личные приоритеты и причины"
        acceptableFrom: 3

  # Архитектура и системное мышление
  - id: comp_system_arch
    title: "Архитектура и системное мышление"
    block: block2
    weight: 0.30
    indicators:

      - id: ind_arch_incident
        text: "Системно локализует инцидент: метрики → гипотезы → фикс → пост-мортем"
        signals: [starComponents, hasMetrics, ownershipRatio]
        bars:
          0: "Описывает действия команды обезличенно или не восстанавливает ход расследования"
          1: "Помнит факт инцидента, но не может воспроизвести методологию диагностики"
          2: "Использовал один инструмент (только логи или только метрики); симптом найден, без пост-мортема"
          3: "Описывает последовательность: метрики → логи/трейсы → гипотезы → изоляция → фикс"
          4: "Добавляет пост-мортем, системный фикс (не точечный патч), валидацию под нагрузкой"
          5: "Полный STAR + root cause + архитектурные изменения + измеримая деградация и восстановление"
        acceptableFrom: 3

      - id: ind_arch_design
        text: "Выбирает адекватные протоколы и осознанно обсуждает trade-offs"
        signals: [termCoverage, answerLength]
        terms: ["WebSocket", "gRPC", "long polling", "Server-Sent Events", "SSE",
                "Redis", "кэш", "кэширование", "инвалидация", "pub/sub", "Kafka",
                "горизонтальное масштабирование", "консистентность", "latency", "задержка"]
        bars:
          0: "Называет один протокол без обоснования или путает клиент-серверные модели"
          1: "Знает WebSockets, но не сравнивает с альтернативами и не затрагивает масштабирование"
          2: "Сравнивает 2–3 протокола, но не рассматривает кэширование и стратегии инвалидации"
          3: "Обсуждает протоколы + кэширование (Redis / in-memory) + стратегии инвалидации кэша"
          4: "Добавляет рассуждение о консистентности, fallback-стратегии, объём нагрузки"
          5: "Проектирует систему end-to-end: нагрузка, отказоустойчивость, CAP trade-offs"
        acceptableFrom: 3

  # ── Tech глубина (Go Internals) ─────────────────────────────────────────────
  - id: comp_tech_go
    title: "Tech глубина (Go Internals)"
    block: block3
    weight: 0.35
    indicators:

      - id: ind_go_slices
        text: "Правильно объясняет устройство слайса и механизм неочевидной утечки памяти"
        signals: [termCoverage, answerLength]
        terms: ["слайс", "len", "cap", "pointer", "указатель", "базовый массив",
                "утечка", "GC", "сборщик мусора", "copy", "копирование"]
        bars:
          0: "Ошибается в базовом устройстве или не знает про len / cap / ptr"
          1: "Знает len и cap, но не понимает, что слайс — дескриптор над общим массивом"
          2: "Понимает устройство, но не может объяснить, почему GC не соберёт большой массив"
          3: "Верно объясняет утечку (малый срез удерживает большой массив) и называет copy() как решение"
          4: "Приводит пример кода или реальный сценарий из практики"
          5: "Объясняет escape analysis, почему массив уходит в heap, и как проверить через pprof"
        acceptableFrom: 3

      - id: ind_go_map_sync
        text: "Знает опасность concurrent map writes и выбирает верные примитивы синхронизации"
        # hedgingDensity (лексика) + pauseRatio (просодика) = маркеры неуверенности в материале
        signals: [termCoverage, hedgingDensity, pauseRatio]
        terms: ["concurrent map", "fatal error", "recover", "мьютекс", "sync.RWMutex",
                "sync.Map", "гонка данных", "race detector", "data race", "-race"]
        bars:
          0: "Думает, что recover поймает fatal error, или не знает о проблеме конкурентного доступа"
          1: "Знает про панику, но считает, что её можно поймать через recover"
          2: "Правильно описывает поведение, но не объясняет, почему recover бессилен"
          3: "Объясняет fatal error + бессилие recover + называет sync.RWMutex или sync.Map"
          4: "Сравнивает sync.RWMutex и sync.Map: когда что применять и какой overhead"
          5: "Добавляет -race flag и объясняет, как рантайм детектирует гонки на уровне инструментации"
        acceptableFrom: 3

      - id: ind_go_channels
        text: "Различает семантику nil-канала и закрытого канала"
        signals: [termCoverage, hedgingDensity]
        terms: ["nil", "nil-канал", "закрытый", "close", "zero value", "блокирует",
                "deadlock", "дедлок", "select", "навсегда"]
        bars:
          0: "Путает nil-канал и закрытый канал или описывает поведение неверно"
          1: "Знает, что они ведут себя по-разному, но не может объяснить механизм"
          2: "Верно описывает одно из двух поведений, путается в другом"
          3: "Чётко разграничивает: закрытый → zero value немедленно; nil → блокировка навсегда"
          4: "Объясняет применение nil-канала в select для отключения ветки как паттерн"
          5: "Приводит практический пример кода и объясняет, когда каждое поведение полезно"
        acceptableFrom: 3

      - id: ind_go_gc_perf
        text: "Знает инструменты профилирования Go и паттерны снижения давления на GC"
        signals: [termCoverage, hasMetrics]
        terms: ["pprof", "escape analysis", "sync.Pool", "преаллокация", "make",
                "стек", "куча", "heap", "alloc", "GC pause", "GOGC"]
        bars:
          0: "Не знает pprof или предлагает только «купить больше RAM / памяти»"
          1: "Слышал про pprof, но не применял в реальных задачах"
          2: "Умеет снять CPU / heap профиль, но не знает escape analysis и sync.Pool"
          3: "Называет pprof + escape analysis + sync.Pool + преаллокацию как связанный подход"
          4: "Объясняет trade-off sync.Pool (reset overhead vs GC) и tuning через GOGC"
          5: "Приводит конкретный кейс из практики с метриками до / после оптимизации"
        acceptableFrom: 3

  # ── Уверенность и беглость речи (просодика) ──────────────────────────────────
  # Оценивается ТОЛЬКО при аудиовходе (нужен сайдкар с Praat). Для текстовых
  # интервью индикаторы пропускаются, и домен не попадает в скоркарту.
  # Сигналы — поля com.interviewengine.domain.ProsodicFeatures.
  - id: comp_speech_confidence
    title: "Уверенность и беглость речи"
    block: block2
    weight: 0.15
    indicators:

      - id: ind_speech_fluency
        text: "Говорит в ровном темпе, без длинных пауз и заминок"
        signals: [speechRate, pauseRatio, meanPauseMs]
        bars:
          0: "Рваный темп: очень медленно с долгими паузами или сбивчиво и торопливо"
          1: "Частые заминки и паузы заполнения, мысль постоянно прерывается"
          2: "Заметные паузы перед простыми ответами мешают восприятию"
          3: "В целом ровно; паузы перед сложными местами уместны"
          4: "Стабильный комфортный темп, паузы только осмысленные"
          5: "Ровный темп ~100–160 слов/мин, речь течёт без заминок"
        acceptableFrom: 3

      - id: ind_intonation_expressiveness
        text: "Речь выразительная, интонационно живая, не монотонная"
        signals: [pitchVariationSemitones, intensityVariationDb]
        bars:
          0: "Монотонно, на одной ноте, без интонационных акцентов"
          1: "Интонация почти плоская, акценты отсутствуют"
          2: "Редкие интонационные движения, речь суховата"
          3: "Есть интонационная вариативность, речь не плоская"
          4: "Хорошая выразительность, смысловые акценты слышны голосом"
          5: "Живая выразительная интонация, голосом выделяет главное"
        acceptableFrom: 3
